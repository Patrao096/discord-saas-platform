version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: saas_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-saas_bot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saas_cache
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: